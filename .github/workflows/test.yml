name: Test

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3

      - name: Test
        env:
          TEST_FN_DISABLED: true
        run: go test -v -p=1 ./... -cover -coverprofile cover.out  && go tool cover -func cover.out

      - name: Build
        run: go build -v ./...