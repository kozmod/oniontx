version: "2"

# More info on config here: https://golangci-lint.run/usage/configuration/#config-file
run:
  concurrency: 8
  timeout: 5m
  issues-exit-code: 1
  tests: true
  go: '1.20'

output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true
      colors: true

linters:
  default: none
  enable:
    - dupl
    - errcheck
    - goconst
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused # will be used instead of varcheck + deadcode + structcheck. More info https://github.com/golangci/golangci-lint/issues/1841
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gosec:
      # To select a subset of rules to run.
      # Available rules: https://github.com/securego/gosec#available-rules
      includes:
        - G401
        - G306
        - G101
      # To specify a set of rules to explicitly exclude.
      # Available rules: https://github.com/securego/gosec#available-rules
      excludes:
        - G204
      # To specify the configuration of rules.
      # The configuration of rules is not fully documented by gosec:
      # https://github.com/securego/gosec#configuration
      # https://github.com/securego/gosec/blob/569328eade2ccbad4ce2d0f21ee158ab5356a5cf/rules/rulelist.go#L60-L102
      config:
        G306: "0600"
        G101:
          pattern: "(?i)example"
          ignore_entropy: false
          entropy_threshold: "80.0"
          per_char_threshold: "3.0"
          truncate: "32"
  exclusions:
    paths:
      - bin
      - vendor
      - var
      - tmp
      - .github
    rules:
      # _ instead of err checks
      - path: ".*"
        text: G104
      # for "public interface + private struct implementation" cases only!
      - path: ".*"
        text: exported func .* returns unexported type .*, which can be annoying to use
      # can be removed in the development phase
      # - path: ".*"
      #   text: (comment on exported (method|function|type|const)|should have( a package)? comment|comment should be of the form)
      # not for the active development - can be removed in the stable phase
      - path: ".*"
        text: should have a package comment, unless it's in another file for this package
      - path: ".*"
        text: don't use an underscore in package name
      # EXC0001 errcheck: Almost all programs ignore errors on these functions and in most cases it's ok
      - path: ".*"
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*print(f|ln)?|os\.(Un)?Setenv). is not checked
      - path: ".*"
        text: should check returned error before deferring
